# .toolkit/settings.yaml
# Toolkit configuration for aicode-toolkit monorepo
#
# Local overrides go in .toolkit/settings.local.yaml (add to .gitignore).
# Run `aicode sync` to regenerate .claude/settings.json and mcp-config.yaml.

projectType: monorepo
version: '1.0'

# ---------------------------------------------------------------------------
# scaffold-mcp
# ---------------------------------------------------------------------------

scaffold-mcp:

  mcp-serve:
    adminEnable: true
    promptAsSkill: true

  hook:
    claude-code:
      preToolUse:
        # hook reads llm-tool/tool-config from this file at runtime

      postToolUse:

      stop:

      userPromptSubmit:

      taskCompleted:

# ---------------------------------------------------------------------------
# architect-mcp
# ---------------------------------------------------------------------------

architect-mcp:

  mcp-serve:
    adminEnable: true
    designPatternTool: gemini-cli
    designPatternToolConfig:
      model: gemini-3-flash-preview
    reviewTool: gemini-cli
    reviewToolConfig:
      model: gemini-3-flash-preview

  hook:
    claude-code:
      preToolUse:
        llm-tool: gemini-cli
        tool-config:
          model: gemini-3-flash-preview

      postToolUse:
        llm-tool: gemini-cli
        tool-config:
          model: gemini-3-flash-preview

