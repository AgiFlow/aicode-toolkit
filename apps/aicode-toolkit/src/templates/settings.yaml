# .toolkit/settings.yaml
# Toolkit configuration for aicode-toolkit
#
# Local overrides go in .toolkit/settings.local.yaml (add to .gitignore).
# Local settings are shallow-merged over this file — useful for per-developer
# LLM tool preferences or API keys without committing them.
#
# All fields are optional. Uncomment and edit what you need.

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------

# Project type: monolith (single app) or monorepo (multiple packages/apps)
# projectType: monolith

# Path to the scaffold templates directory, relative to workspace root.
# templatesPath: ./templates

# Active template name (monolith only — monorepo reads from project.json).
# sourceTemplate: react-vite

# Config schema version.
# version: '1.0'

# ---------------------------------------------------------------------------
# scaffold-mcp — configuration for the scaffold-mcp CLI
# CLI flags always take precedence over values set here.
# ---------------------------------------------------------------------------

scaffold-mcp:

  # -------------------------------------------------------------------------
  # mcp-serve — defaults for `scaffold-mcp mcp-serve`
  # -------------------------------------------------------------------------
  mcp-serve:
    # Transport type: stdio | http | sse  (default: stdio)
    # type: stdio

    # Port for http/sse transport (default: 3000)
    # port: 3000

    # Host to bind for http/sse transport (default: localhost)
    # host: localhost

    # Enable admin tools such as generate-boilerplate (default: false)
    # adminEnable: false

    # Render prompts with skill front matter for Claude Code (default: false)
    # promptAsSkill: false

    # Fallback LLM tool used when scaffold-mcp needs AI assistance.
    # Supported: claude-code | gemini-cli | codex
    # fallbackTool: gemini-cli

    # Config passed to the fallback LLM tool.
    # fallbackToolConfig:
    #   model: gemini-2.0-flash

    # Ordered fallback chain used when fallbackTool is not set.
    # The first valid entry wins.
    # fallbacks:
    #   - tool: gemini-cli
    #     config:
    #       model: gemini-2.0-flash
    #   - tool: codex
    #     config:
    #       model: gpt-5.2-mini

    # Extra CLI args merged into the mcp-serve command (key: value → --key value)
    # args:
    #   review-tool: gemini-cli

  # -------------------------------------------------------------------------
  # hook — defaults for `scaffold-mcp hook`
  # Keyed by agent name, then by hook method.
  # Supported agents  : claude-code | gemini-cli
  # Supported methods : preToolUse | postToolUse | userPromptSubmit | taskCompleted | stop
  # CLI flags --fallback-tool and --fallback-tool-config still take precedence.
  # -------------------------------------------------------------------------
  hook:

    claude-code:
      preToolUse:
        # LLM tool to use for this hook. Supported: claude-code | gemini-cli | codex
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # fallbacks:
        #   - tool: codex
        #     config:
        #       model: gpt-5.2-mini
        # matcher: Edit|MultiEdit|Write
        # Extra CLI args appended to the generated hook command (key: value → --key value)
        # args:
        #   llm-tool: gemini-cli

      postToolUse:
        # matcher: Edit|MultiEdit|Write
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # args:
        #   llm-tool: gemini-cli

      userPromptSubmit:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # args:
        #   llm-tool: gemini-cli

      taskCompleted:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # args:
        #   llm-tool: gemini-cli

      stop:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # args:
        #   llm-tool: gemini-cli

    gemini-cli:
      preToolUse:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash

      postToolUse:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash

# ---------------------------------------------------------------------------
# architect-mcp — configuration for the architect-mcp CLI
# CLI flags always take precedence over values set here.
# ---------------------------------------------------------------------------

architect-mcp:

  # -------------------------------------------------------------------------
  # mcp-serve — defaults for `architect-mcp mcp-serve`
  # -------------------------------------------------------------------------
  mcp-serve:
    # Transport type: stdio | http | sse  (default: stdio)
    # type: stdio

    # Port for http/sse transport (default: 3000)
    # port: 3000

    # Host to bind for http/sse transport (default: localhost)
    # host: localhost

    # Enable admin tools such as add-design-pattern and add-rule (default: false)
    # adminEnable: false

    # Fallback LLM tool used for both design-pattern and review when specific tools are not set.
    # Supported: claude-code | gemini-cli | codex
    # fallbackTool: gemini-cli

    # Config passed to the fallback LLM tool.
    # fallbackToolConfig:
    #   model: gemini-2.0-flash

    # Ordered fallback chain used when fallbackTool is not set.
    # The first valid entry wins.
    # fallbacks:
    #   - tool: gemini-cli
    #     config:
    #       model: gemini-2.0-flash
    #   - tool: codex
    #     config:
    #       model: gpt-5.2-mini

    # LLM tool used specifically for get-file-design-pattern analysis.
    # Overrides fallbackTool for design pattern operations.
    # designPatternTool: gemini-cli

    # Config passed to the design pattern LLM tool.
    # designPatternToolConfig:
    #   model: gemini-2.0-flash

    # LLM tool used specifically for review-code-change analysis.
    # Overrides fallbackTool for code review operations.
    # reviewTool: gemini-cli

    # Config passed to the review LLM tool.
    # reviewToolConfig:
    #   model: gemini-2.0-flash

    # Extra CLI args merged into the mcp-serve command (key: value → --key value)
    # args:
    #   review-tool: gemini-cli

  # -------------------------------------------------------------------------
  # hook — defaults for `architect-mcp hook`
  # Keyed by agent name, then by hook method.
  # Supported agents  : claude-code | gemini-cli
  # Supported methods : preToolUse | postToolUse
  # CLI flags --llm-tool, --fallback-tool, and --tool-config still take precedence.
  # -------------------------------------------------------------------------
  hook:

    claude-code:
      preToolUse:
        # Static pattern matching is usually enough here. Leave llm-tool unset unless
        # you want extra pattern filtering via LLM.
        # fallback-tool: gemini-cli
        # fallback-tool-config:
        #   model: gemini-2.0-flash
        # fallbacks:
        #   - tool: codex
        #     config:
        #       model: gpt-5.2-mini
        # matcher: Edit|MultiEdit|Write
        # Extra CLI args appended to the generated hook command (key: value → --key value)
        # args:
        #   llm-tool: gemini-cli

      postToolUse:
        # matcher: Edit|MultiEdit|Write
        # Set llm-tool only if you want LLM-based review. A cheap model is recommended.
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash
        # fallbacks:
        #   - tool: codex
        #     config:
        #       model: gpt-5.2-mini
        # args:
        #   llm-tool: gemini-cli

    gemini-cli:
      preToolUse:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash

      postToolUse:
        # llm-tool: gemini-cli
        # tool-config:
        #   model: gemini-2.0-flash

